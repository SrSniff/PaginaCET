<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Tensão RMS e Pico Educacional</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <img src="LOGO.PNG" alt="Logo" class="logo" id="mainLogo">
            <h1>Cálculo de Tensão Alternada</h1>
            <p class="subtitle">Aprenda a converter valores de Pico e RMS</p>
        </header>

        <main class="calculator-card">
            <div class="input-group">
                <div class="field">
                    <label for="peakValue">Tensão de Pico (V<sub>p</sub>)</label>
                    <input type="number" id="peakValue" placeholder="Ex: 179.6" step="0.01">
                </div>
                <div class="icon-swap">⇄</div>
                <div class="field">
                    <label for="rmsValue">Tensão RMS (V<sub>rms</sub>)</label>
                    <input type="number" id="rmsValue" placeholder="Ex: 127" step="0.01">
                </div>
            </div>

            <div id="explanation" class="explanation-box">
                <p class="placeholder-text">Insira um valor acima para ver o cálculo passo a passo.</p>
            </div>

            <button id="clearBtn" class="secondary-button">Limpar Tudo</button>
        </main>

        <footer>
            <p>&copy; 2026 Página Educacional de Eletrônica</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
